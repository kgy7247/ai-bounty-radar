name: Refresh opportunities

on:
  workflow_dispatch:
  schedule:
    - cron: "10 0 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/refresh-opportunities.mjs
      - name: Commit refreshed data
        run: |
          if git diff --quiet docs/opportunities.json; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/opportunities.json
          git commit -m "Refresh opportunities"
          git push
